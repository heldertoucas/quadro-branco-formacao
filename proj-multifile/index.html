<!DOCTYPE html>
<html lang="pt-PT" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadro Branco v3.0</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Orbitron:wght@400;700&family=Patrick+Hand&family=Quicksand:wght@400;700&family=Raleway:wght@400;700&family=Poppins:wght@400;700&family=VT323&family=Press+Start+2P&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <!-- DEV_ONLY_START -->
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="ui.css">
    <link rel="stylesheet" href="animations.css">
    <!-- DEV_ONLY_END -->

    <!-- INJECT_STYLES -->
</head>

<body data-mode="pro">

    <div class="background"></div>
    <div id="sunburst" class="sunburst"></div>

    <!-- HEADER: Logo & Menu -->
    <header id="logo-area" onclick="handleLogoAreaClick(event)">
        <button id="logo-btn" onclick="toggleMenu(event)" aria-label="Abrir Menu de Tema" aria-haspopup="true">
            <img id="app-logo" src="" alt="Logo">
            <span id="logo-arrow">▼</span>
            <svg class="icon-hamburger" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 12H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path d="M3 6H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path d="M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
        </button>

        <div id="style-menu" class="dropdown-menu" role="menu">
            <button class="menu-close-btn" onclick="toggleMenu(event)" aria-label="Fechar Menu">×</button>
            <div class="menu-content">
                <div class="menu-category">Programa</div>
                <button class="menu-item" onclick="app.setBrand('cml')" id="brand-cml" role="menuitem">
                    <div class="menu-dot"></div> CMLisboa
                </button>
                <button class="menu-item" onclick="app.setBrand('futuro')" id="brand-futuro" role="menuitem">
                    <div class="menu-dot"></div> Futuro Digital
                </button>
                <button class="menu-item" onclick="app.setBrand('passaporte')" id="brand-passaporte" role="menuitem">
                    <div class="menu-dot"></div> Passaporte Competências
                </button>
                <button class="menu-item" onclick="app.setBrand('ia')" id="brand-ia" role="menuitem">
                    <div class="menu-dot"></div> IA para Todos
                </button>

                <div class="menu-divider"></div>

                <div class="menu-category">Modo</div>
                <button class="menu-item" onclick="app.setMode('pro')" id="mode-pro" role="menuitem">
                    <div class="menu-dot"></div> Pro
                </button>
                <button class="menu-item" onclick="app.setMode('simple')" id="mode-simple" role="menuitem">
                    <div class="menu-dot"></div> Zen
                </button>

                <div class="menu-divider"></div>

                <div class="menu-category">Tema</div>
                <button class="menu-item" onclick="app.setTheme('dark')" id="theme-dark" role="menuitem">
                    <div class="menu-dot"></div> Escuro
                </button>
                <button class="menu-item" onclick="app.setTheme('light')" id="theme-light" role="menuitem">
                    <div class="menu-dot"></div> Claro
                </button>

                <div class="menu-divider"></div>

                <button class="menu-item" onclick="app.setTheme('neon')" id="theme-neon" role="menuitem">
                    <div class="menu-dot"></div> Neon
                </button>
                <button class="menu-item" onclick="app.setTheme('sketch')" id="theme-sketch" role="menuitem">
                    <div class="menu-dot"></div> Sketch
                </button>
                <button class="menu-item" onclick="app.setTheme('nature')" id="theme-nature" role="menuitem">
                    <div class="menu-dot"></div> Natureza
                </button>
                <button class="menu-item" onclick="app.setTheme('ocean')" id="theme-ocean" role="menuitem">
                    <div class="menu-dot"></div> Oceano
                </button>
                <button class="menu-item" onclick="app.setTheme('sunset')" id="theme-sunset" role="menuitem">
                    <div class="menu-dot"></div> Pôr do Sol
                </button>
                <button class="menu-item" onclick="app.setTheme('gameboy')" id="theme-gameboy" role="menuitem">
                    <div class="menu-dot"></div> Gameboy
                </button>
                <button class="menu-item" onclick="app.setTheme('8bit')" id="theme-8bit" role="menuitem">
                    <div class="menu-dot"></div> 8-bit
                </button>
            </div>
        </div>
    </header>

    <!-- NAVIGATION -->
    <button id="nav-left" class="nav-arrow left" onclick="app.navHistory('back')" aria-label="Recuar no Histórico">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="m15 18-6-6 6-6" />
        </svg>
    </button>
    <button id="nav-right" class="nav-arrow right" onclick="app.navHistory('fwd')"
        aria-label="Avançar (Fila ou Histórico)">
        <div id="nav-queue-count" class="nav-queue-badge hidden">0</div>
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="m9 18 6-6-6-6" />
        </svg>
    </button>

    <!-- OVERLAYS -->
    <div id="scoreboard"></div>
    <div id="timer-overlay" onmousedown="features.timer.startDrag(event)">
        <svg class="timer-ring" width="180" height="180" viewBox="0 0 180 180">
            <circle class="timer-ring-bg" cx="90" cy="90" r="80" fill="none" stroke-width="10"></circle>
            <circle id="timer-progress" class="timer-ring-fill" cx="90" cy="90" r="80" fill="none" stroke-width="10"
                stroke-dasharray="502.65" stroke-dashoffset="0" transform="rotate(-90 90 90)"></circle>
        </svg>
        <div id="timer-display">00:00</div>
        <button id="timer-extend-btn" class="tool-btn" onclick="features.timer.start(300, false, true)"
            style="position:absolute; bottom:-45px; background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:12px; font-size:0.8rem; padding:4px 12px; display:none; white-space:nowrap; z-index:2001;">+5 min</button>
    </div>

    <!-- MAIN CONTENT -->
    <main id="display-area" aria-live="polite">
        <h1 id="main-text"></h1>
        <div id="qr-container">
            <button id="qr-close" onclick="ui.closeQR()" aria-label="Fechar QR Code">×</button>
            <div id="qr-canvas-wrapper"></div>
        </div>
        <div id="poll-display"></div>
        <div id="poll-actions" style="display:none;">
            <button class="poll-btn" onclick="features.poll.checkWinner()" title="Apurar Vencedor"
                style="background:var(--success-color); color:white; width:auto; padding:0 20px;">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none"
                    style="margin-right:8px;">
                    <circle cx="12" cy="12" r="10"></circle>
                    <circle cx="12" cy="12" r="6"></circle>
                    <circle cx="12" cy="12" r="2"></circle>
                </svg>
                Apurar
            </button>
            <button class="poll-btn" onclick="features.poll.close()" title="Fechar Votação"
                style="background:var(--danger-color); color:white;">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none"
                    style="margin-right:8px;">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="15" y1="9" x2="9" y2="15"></line>
                    <line x1="9" y1="9" x2="15" y2="15"></line>
                </svg>
                Fechar
            </button>
        </div>
        <canvas id="ink-canvas"></canvas>
    </main>

    <!-- FOOTER: Control Panel (3-Tier) -->
    <footer id="control-panel">

        <!-- TIER 3: TOOL OPTIONS (Tertiary Bar) -->
        <div id="tertiary-bar" class="secondary-bar hidden">

            <!-- TEXTO -->
            <div id="sec-richtext" class="sec-module">
                <button id="fmt-bold" class="tool-btn icon-only"
                    onmousedown="event.preventDefault(); document.execCommand('bold', false, null); ui.updateFormatButtons()"
                    title="Negrito">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2.5"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></svg>
                </button>
                <button id="fmt-italic" class="tool-btn icon-only"
                    onmousedown="event.preventDefault(); document.execCommand('italic', false, null); ui.updateFormatButtons()"
                    title="Itálico">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><line x1="19" y1="4" x2="10" y2="4"></line><line x1="14" y1="20" x2="5" y2="20"></line><line x1="15" y1="4" x2="9" y2="20"></line></svg>
                </button>
                <button id="fmt-underline" class="tool-btn icon-only"
                    onmousedown="event.preventDefault(); document.execCommand('underline', false, null); ui.updateFormatButtons()"
                    title="Sublinhado">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"></path><line x1="4" y1="21" x2="20" y2="21"></line></svg>
                </button>
                <div class="divider"></div>
                <button id="fmt-list" class="tool-btn icon-only" onmousedown="event.preventDefault(); document.execCommand('insertUnorderedList', false, null); ui.updateFormatButtons()" title="Lista">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                </button>
                <button id="fmt-num" class="tool-btn icon-only" onmousedown="event.preventDefault(); document.execCommand('insertOrderedList', false, null); ui.updateFormatButtons()" title="Numeração">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"></line><line x1="10" y1="12" x2="21" y2="12"></line><line x1="10" y1="18" x2="21" y2="18"></line><path d="M4 6h1v4"></path><path d="M4 10h2"></path><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"></path></svg>
                </button>
                <div class="divider"></div>
                <button id="fmt-left" class="tool-btn icon-only" onclick="ui.setTextAlignment('left')" title="Alinhar à Esquerda">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><line x1="17" y1="10" x2="3" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="17" y1="18" x2="3" y2="18"></line></svg>
                </button>
                <button id="fmt-center" class="tool-btn icon-only" onclick="ui.setTextAlignment('center')" title="Alinhar ao Centro">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><line x1="21" y1="10" x2="3" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="21" y1="18" x2="3" y2="18"></line></svg>
                </button>
                <button id="fmt-right" class="tool-btn icon-only" onclick="ui.setTextAlignment('right')" title="Alinhar à Direita">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><line x1="21" y1="10" x2="7" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="21" y1="18" x2="7" y2="18"></line></svg>
                </button>
                <div class="divider"></div>
                <button id="btn-serif" class="tool-btn icon-only" onclick="ui.toggleSerif()" title="Modo Serifa">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><path d="M4 20h4L12 4h4l4 16h-4"></path><line x1="8" y1="14" x2="16" y2="14"></line></svg>
                </button>
                <button id="btn-highlight" class="tool-btn icon-only" onclick="ui.toggleHighlight()" title="Destaque Glow">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path><path d="M5 3v4"></path><path d="M19 17v4"></path><path d="M3 5h4"></path><path d="M17 19h4"></path></svg>
                </button>
                <button id="btn-animate" class="tool-btn icon-only" onclick="ui.toggleAnimations()" title="Animar Entrada">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
                </button>
                
                <div class="divider"></div>
                <button id="btn-create-slide" class="tool-btn hidden" onclick="features.slide.toggleInline()" title="Criar Slide">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg> Slide
                </button>

                <div class="divider" id="slide-divider" style="display:none;"></div>
                <div id="slide-colors-toolbar" style="display:none; gap:10px; align-items:center;">
                    <div class="inline-scheme-btn" style="background: linear-gradient(135deg, #FFB743, #FF4D00);"
                        onclick="features.slide.setScheme('default')"></div>
                    <div class="inline-scheme-btn" style="background: linear-gradient(135deg, #5271FF, #933EC5);"
                        onclick="features.slide.setScheme('scheme2')"></div>
                    <div class="inline-scheme-btn" style="background: linear-gradient(135deg, #35B729, #FF4D00);"
                        onclick="features.slide.setScheme('scheme3')"></div>
                </div>
            </div>

            <!-- PLAY (Includes Gamification, Polls, QR, Picker, Dice) -->
            <div id="sec-play" class="sec-module">
                <button class="tool-btn" id="btn-timer" onclick="features.timer.toggle()">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> Timer
                </button>
                <button class="tool-btn" onclick="features.score.setup()">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg> Placar
                </button>
                <button class="tool-btn" onclick="features.poll.setup()">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><path d="M12 20v-6M6 20V10M18 20V4"></path></svg> Votação
                </button>
                <div class="divider"></div>
                <button class="tool-btn" onclick="ui.toggleQR()">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><rect width="5" height="5" x="3" y="3" rx="1"></rect><rect width="5" height="5" x="16" y="3" rx="1"></rect><rect width="5" height="5" x="3" y="16" rx="1"></rect><path d="M21 16h-3a2 2 0 0 0-2 2v3"></path><path d="M21 21v.01"></path><path d="M12 7v3a2 2 0 0 1-2 2H7"></path><path d="M3 12h.01"></path><path d="M12 3h.01"></path><path d="M12 3h.01"></path><path d="M12 16v.01"></path><path d="M16 12h1"></path><path d="M21 12v.01"></path><path d="M12 21v-1"></path></svg> QR Code
                </button>
                <button class="tool-btn" onclick="features.picker.setup()">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><path d="M20.42 4.58a5.4 5.4 0 0 0-7.65 0l-.77.78-.77-.78a5.4 5.4 0 0 0-7.65 0C1.46 6.7 1.33 10.28 4 13l8 8 8-8c2.67-2.72 2.54-6.3.42-8.42z"></path></svg> Sorteio
                </button>
                <button class="tool-btn" onclick="features.dice.roll()">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect><path d="M16 8h.01"></path><path d="M8 8h.01"></path><path d="M8 16h.01"></path><path d="M16 16h.01"></path><path d="M12 12h.01"></path></svg> Dados
                </button>
            </div>

            <!-- PAINT (Integrated Paint Tools) -->
            <div id="sec-paint" class="sec-module">
                <div id="ink-palette" style="display:flex; gap:8px; margin-left:8px;"></div>
                <div class="divider"></div>
                <button class="tool-btn active icon-only" id="ink-pen1" onclick="features.ink.setPen(1)" title="Caneta Fina">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><path d="m12 19 7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path></svg>
                </button>
                <button class="tool-btn icon-only" id="ink-pen2" onclick="features.ink.setPen(2)" title="Caneta Grossa">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="3"><path d="m12 19 7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path></svg>
                </button>
                <button class="tool-btn icon-only" id="ink-eraser" onclick="features.ink.setEraser()" title="Borracha">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><path d="M20 20H7L3 16C2 15 2 13 3 12L13 2L22 12L20 20Z"></path><line x1="17" y1="17" x2="7" y2="7"></line></svg>
                </button>
                <div class="divider"></div>
                <button class="tool-btn icon-only" onclick="features.ink.clear()" title="Limpar Tudo">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                </button>
            </div>

            <!-- SOUND -->
            <div id="sec-sound" class="sec-module"></div>

            <!-- TOOLS (System) -->
            <div id="sec-tools" class="sec-module">
                <button id="btn-links" class="tool-btn" onclick="ui.toggleLinkMenu()">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg> Links
                </button>
                <button class="tool-btn" onclick="app.clear()">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg> Limpar Ecrã
                </button>
                <button class="tool-btn" onclick="window.open('index.html?mode=projector', '_blank')">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg> Projetor
                </button>
            </div>
        </div>

        <!-- TIER 2: MAIN CATEGORIES (Secondary Bar) -->
        <div id="secondary-bar" class="secondary-bar hidden">
            <button class="tool-btn" id="mod-icon-richtext" onclick="ui.toggleTertiary('richtext')">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2"><path d="M4 7V4h16v3M9 20h6M12 4v16" /></svg> Texto
            </button>
            <button class="tool-btn" id="mod-icon-play" onclick="ui.toggleTertiary('play')">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg> Play
            </button>
            <button class="tool-btn" id="mod-icon-paint" onclick="ui.toggleTertiary('paint')">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path></svg> Desenho
            </button>
            <button class="tool-btn" id="mod-icon-sound" onclick="ui.toggleTertiary('sound')">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg> Sons
            </button>
            <button class="tool-btn" id="mod-icon-tools" onclick="ui.toggleTertiary('tools')">

    <script>
        class ModalSystem {
            constructor() {
                this.overlay = document.getElementById('modal-overlay');
                this.title = document.getElementById('modal-title');
                this.body = document.getElementById('modal-body');
                this.confirmBtn = document.getElementById('modal-confirm');
                this.cancelBtn = document.getElementById('modal-cancel');
                this.resolve = null;

                this.confirmBtn.onclick = () => this.handleConfirm();
                this.cancelBtn.onclick = () => this.handleCancel();
                this.overlay.onclick = (e) => { if (e.target === this.overlay) this.handleCancel(); };
            }

            show({ title, html, onConfirm }) {
                return new Promise((resolve) => {
                    this.title.innerText = title;
                    this.body.innerHTML = html;
                    this.overlay.classList.add('open');
                    this.overlay.setAttribute('aria-hidden', 'false');
                    this.resolve = resolve;
                    
                    const input = this.body.querySelector('input, textarea');
                    if (input) setTimeout(() => input.focus(), 100);

                    this._onConfirm = onConfirm;
                });
            }

            handleConfirm() {
                const input = this.body.querySelector('input, textarea');
                const val = input ? input.value : true;
                this.close();
                if (this._onConfirm) this._onConfirm(val);
                if (this.resolve) this.resolve(val);
            }

            handleCancel() {
                this.close();
                if (this.resolve) this.resolve(null);
            }

            close() {
                this.overlay.classList.remove('open');
                this.overlay.setAttribute('aria-hidden', 'true');
            }
        }
        const modal = new ModalSystem();
    </script>
