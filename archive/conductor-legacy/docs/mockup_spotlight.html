<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup: Command Spotlight</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --spotlight-bg: rgba(255, 255, 255, 0.8);
            --accent: #10b981;
            --text: #1f2937;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #f3f4f6;
            height: 100vh;
            overflow: hidden;
            color: var(--text);
        }

        .canvas {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #d1d5db;
            font-size: 2rem;
            user-select: none;
        }

        /* Spotlight Overlay */
        .spotlight-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.1);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            padding-top: 15vh;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 5000;
        }

        .spotlight-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .spotlight-window {
            width: 600px;
            max-width: 90%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            transform: translateY(-20px);
            transition: transform 0.2s;
            border: 1px solid #e5e7eb;
        }

        .spotlight-overlay.visible .spotlight-window {
            transform: translateY(0);
        }

        .spotlight-input-container {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #f3f4f6;
        }

        .spotlight-input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 1.4rem;
            color: var(--text);
            background: transparent;
        }

        .spotlight-results {
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .result-item {
            padding: 12px 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: background 0.1s;
        }

        .result-item:hover, .result-item.selected {
            background: #f3f4f6;
        }

        .result-icon {
            font-size: 1.5rem;
            width: 40px;
            height: 40px;
            background: #f9fafb;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .result-info {
            display: flex;
            flex-direction: column;
        }

        .result-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .result-desc {
            font-size: 0.8rem;
            color: #6b7280;
        }

        .shortcut-hint {
            margin-left: auto;
            font-size: 0.7rem;
            color: #9ca3af;
            background: #f3f4f6;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #e5e7eb;
        }

        /* Trigger Button */
        .trigger-btn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            cursor: pointer;
            border: 1px solid #e5e7eb;
            color: #6b7280;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        kbd {
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            border-radius: 3px;
            padding: 1px 5px;
            font-size: 0.7rem;
            font-family: inherit;
        }

    </style>
</head>
<body>

    <div class="canvas">Área do Quadro Branco</div>

    <div class="trigger-btn" id="trigger-btn">
        Clique aqui ou pressione <kbd>⌘</kbd> <kbd>K</kbd> para comandos
    </div>

    <div class="spotlight-overlay" id="overlay">
        <div class="spotlight-window">
            <div class="spotlight-input-container">
                <input type="text" class="spotlight-input" id="search-input" placeholder="O que deseja fazer?" autocomplete="off">
            </div>
            <div class="spotlight-results" id="results-list">
                <!-- Sample results -->
                <div class="result-item" data-cmd="timer">
                    <div class="result-icon">⏱️</div>
                    <div class="result-info">
                        <span class="result-name">Cronómetro</span>
                        <span class="result-desc">Iniciar ou gerir contagem decrescente</span>
                    </div>
                    <div class="shortcut-hint">ENTER</div>
                </div>
                <div class="result-item" data-cmd="polls">
                    <div class="result-icon">📊</div>
                    <div class="result-info">
                        <span class="result-name">Criar Votação</span>
                        <span class="result-desc">Lançar nova pergunta interactiva</span>
                    </div>
                </div>
                <div class="result-item" data-cmd="audio">
                    <div class="result-icon">🔊</div>
                    <div class="result-info">
                        <span class="result-name">Sons de Feedback</span>
                        <span class="result-desc">Tocar aplausos, erro ou sucesso</span>
                    </div>
                </div>
                <div class="result-item" data-cmd="theme">
                    <div class="result-icon">🎨</div>
                    <div class="result-info">
                        <span class="result-name">Mudar Tema</span>
                        <span class="result-desc">Alternar entre modo claro e escuro</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('overlay');
        const triggerBtn = document.getElementById('trigger-btn');
        const searchInput = document.getElementById('search-input');
        const results = document.querySelectorAll('.result-item');

        function openSpotlight() {
            overlay.classList.add('visible');
            searchInput.value = '';
            setTimeout(() => searchInput.focus(), 50);
        }

        function closeSpotlight() {
            overlay.classList.remove('visible');
        }

        triggerBtn.addEventListener('click', openSpotlight);

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeSpotlight();
        });

        document.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                openSpotlight();
            }
            if (e.key === 'Escape') {
                closeSpotlight();
            }
        });

        results.forEach(item => {
            item.addEventListener('click', () => {
                console.log("Executando comando:", item.dataset.cmd);
                closeSpotlight();
            });
        });

        // Simple filtering
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            results.forEach(item => {
                const name = item.querySelector('.result-name').textContent.toLowerCase();
                const desc = item.querySelector('.result-desc').textContent.toLowerCase();
                if (name.includes(query) || desc.includes(query)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
