<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup: Radial Menu</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --accent: #f5c2e7;
            --menu-bg: rgba(255, 255, 255, 0.1);
            --item-size: 60px;
            --radius: 120px;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        .canvas {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255,255,255,0.1);
            font-size: 3rem;
            user-select: none;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Radial Menu */
        .radial-container {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: var(--item-size);
            height: var(--item-size);
            z-index: 1000;
        }

        .main-button {
            width: var(--item-size);
            height: var(--item-size);
            background: var(--accent);
            color: #1e1e2e;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.8rem;
            box-shadow: 0 0 20px rgba(245, 194, 231, 0.4);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1002;
            position: relative;
        }

        .main-button.open {
            transform: rotate(45deg) scale(0.9);
        }

        .radial-items {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .radial-items.open {
            visibility: visible;
            width: calc(var(--radius) * 2);
            height: calc(var(--radius) * 2);
        }

        .radial-item {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s, transform 0.2s;
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .radial-items.open .radial-item {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .radial-item:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%) scale(1.2);
        }

        /* Module Label */
        .module-label {
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .radial-item:hover .module-label {
            opacity: 1;
        }

        /* Backdrop Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 999;
        }

        .overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

    </style>
</head>
<body>

    <div class="canvas">Whiteboard Space</div>

    <div class="overlay" id="overlay"></div>

    <div class="radial-container">
        <div class="main-button" id="main-btn">＋</div>
        
        <div class="radial-items" id="items-container">
            <!-- Items will be positioned by JS -->
            <div class="radial-item" style="--i:0" data-label="Cronómetro">⏱️<div class="module-label">Cronómetro</div></div>
            <div class="radial-item" style="--i:1" data-label="Votação">📊<div class="module-label">Votação</div></div>
            <div class="radial-item" style="--i:2" data-label="Sons">🔊<div class="module-label">Sons</div></div>
            <div class="radial-item" style="--i:3" data-label="Desenhar">🖍️<div class="module-label">Desenhar</div></div>
            <div class="radial-item" style="--i:4" data-label="Dados">🎲<div class="module-label">Dados</div></div>
            <div class="radial-item" style="--i:5" data-label="QR Code">📱<div class="module-label">QR Code</div></div>
        </div>
    </div>

    <script>
        const mainBtn = document.getElementById('main-btn');
        const itemsContainer = document.getElementById('items-container');
        const overlay = document.getElementById('overlay');
        const items = document.querySelectorAll('.radial-item');

        function toggleMenu() {
            const isOpen = mainBtn.classList.toggle('open');
            itemsContainer.classList.toggle('open');
            overlay.classList.toggle('visible');

            if (isOpen) {
                positionItems();
            }
        }

        function positionItems() {
            const radius = 120; // px
            const total = items.length;
            // We want to distribute items in a 90 degree arc (bottom-right corner) 
            // OR a full circle. Let's do a 90-degree arc for the corner.
            const startAngle = 180; // Start at 9 o'clock
            const endAngle = 270;   // End at 12 o'clock
            
            items.forEach((item, index) => {
                // For a corner menu, we might prefer a 90-180 deg range
                // Let's use 180 to 270 (top-left direction from bottom-right)
                const angle = startAngle + (index * (endAngle - startAngle) / (total - 1));
                const rad = angle * Math.PI / 180;
                
                const x = Math.cos(rad) * radius;
                const y = Math.sin(rad) * radius;
                
                item.style.left = `calc(50% + ${x}px)`;
                item.style.top = `calc(50% + ${y}px)`;
                item.style.transitionDelay = `${index * 0.05}s`;
            });
        }

        mainBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        items.forEach(item => {
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                console.log("Selected:", item.dataset.label);
                toggleMenu();
            });
        });
    </script>
</body>
</html>
